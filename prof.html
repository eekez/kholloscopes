     (Fichier > Partager > Publier sur le web > sélectionner les 4 onglets élèves)

<script>
  const SHEET_ID = "1jxBFq5x4I5X9-W7dQ_y7QSduLn1nvqz15pPeeyQqyg8";
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<body>

<a href="#contenu" class="skip-link">Aller au contenu principal</a>

<header>
  <h1>Mon planning de khôlles</h1>
  <p>Professeurs — Lycée Le Chesnoy — Année 2026-2027</p>
</header>

<main id="contenu">
  <section class="panel" aria-label="Rechercher mon planning">
    <div class="champ">
      <label for="input-nom-prof">Votre nom</label>
      <input type="text" id="input-nom-prof" placeholder="Ex : Laplanche">
    </div>
    <button type="button" class="btn-rechercher" id="btn-rechercher">Afficher mon planning</button>
  </section>

  <section id="zone-resultats" aria-live="polite"></section>
</main>

<footer>
  Les données proviennent du colloscope tenu par l'établissement — en cas d'écart constaté, merci de le signaler pour correction.
</footer>

<script src="khollescope-commun.js"></script>
<script>
(function () {
  "use strict";

  const inputNomProf = document.getElementById('input-nom-prof');
  const btnRechercher = document.getElementById('btn-rechercher');
  const zoneResultats = document.getElementById('zone-resultats');

  async function rechercher() {
    const nom = inputNomProf.value.trim();
    if (!nom) {
      afficherErreur(zoneResultats, 'Merci de saisir un nom.');
      return;
    }
    afficherChargement(zoneResultats);
    try {
      const exportWeb = await chargerExportWeb();
      const toutes = [];
      for (const classe of Object.keys(ONGLETS)) {
        const rows = await chargerOnglet(ONGLETS[classe]);
        const items = extraireCreneaux(rows, classe, {
          nomRecherche: nom,
          pivotMathsTB1: exportWeb.pivot,
          exportWeb: exportWeb,
        });
        toutes.push(...items);
      }
      afficherResultats(zoneResultats, toutes, 'Planning de ' + nom,
        { afficherClasseGroupe: true, afficherNomProf: false });
      afficherHeuresParLot(nom, exportWeb);
    } catch (e) {
      afficherErreur(zoneResultats, 'Impossible de charger le planning pour le moment. Vérifiez votre connexion, ou réessayez plus tard.');
      console.error(e);
    }
  }

  function afficherHeuresParLot(nom, exportWeb) {
    // Recherche insensible à la casse/accents approximative : on cherche une clé
    // de heuresParNom qui correspond au nom saisi (même logique que la recherche
    // de créneaux, en limite de mot).
    const motif = new RegExp('(?:^|\\b)' + nom.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '(?:\\b|$)', 'i');
    const cleTrouvee = Object.keys(exportWeb.heuresParNom).find(cle => motif.test(cle));
    if (!cleTrouvee) return;
    const heures = exportWeb.heuresParNom[cleTrouvee];
    const bloc = document.createElement('div');
    bloc.className = 'panel';
    bloc.style.marginTop = '1.5rem';
    bloc.innerHTML = '<div class="resultats-entete"><h2>Heures déclarées</h2></div>' +
      '<p style="margin:0;color:var(--gris);">' + formatHeuresParLot(heures) + '</p>';
    zoneResultats.appendChild(bloc);
  }

  btnRechercher.addEventListener('click', rechercher);
  inputNomProf.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') rechercher();
  });

  initBandeauInstallation('Khôlles Profs');

  if (SHEET_ID.startsWith('REMPLACER')) {
    afficherErreur(zoneResultats, 'Configuration manquante : l\'identifiant du Google Sheet n\'a pas encore été renseigné dans le code (variable SHEET_ID en haut du fichier).');
  }
})();
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js').catch(() => {
      // Échec silencieux : l'app reste utilisable normalement dans le navigateur,
      // seule l'installation sur l'écran d'accueil pourrait ne pas être proposée.
    });
  }
</script>

</body>
</html>
