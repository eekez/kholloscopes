<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes khôlles — TB1 — Le Chesnoy</title>

<!-- ============================================================================
     CONFIGURATION — à modifier une fois le classeur publié sur le web
     (Fichier > Partager > Publier sur le web > sélectionner l'onglet "TB1 (élèves)")
     ============================================================================ -->
<script>
  const SHEET_ID = "1jxBFq5x4I5X9-W7dQ_y7QSduLn1nvqz15pPeeyQqyg8";
  const CLASSE_FIXE = "TB1";
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="khollescope-style.css">
</head>
<body>

<a href="#contenu" class="skip-link">Aller au contenu principal</a>

<header>
  <h1>Mes khôlles</h1>
  <p>TB1 — Lycée Le Chesnoy — Année 2026-2027</p>
</header>

<main id="contenu">
  <section class="panel" aria-label="Rechercher mon planning">
    <div class="champ">
      <label for="select-groupe-eleve">Mon groupe</label>
      <select id="select-groupe-eleve"></select>
    </div>
    <button type="button" class="btn-rechercher" id="btn-rechercher">Afficher mon planning</button>
  </section>

  <section id="zone-resultats" aria-live="polite"></section>
</main>

<footer>
  Les données proviennent du colloscope tenu par l'établissement — en cas de doute sur un créneau, vérifier auprès du secrétariat ou du professeur concerné.
</footer>

<script src="khollescope-commun.js"></script>
<script>
(function () {
  "use strict";

  const selectGroupeEleve = document.getElementById('select-groupe-eleve');
  const btnRechercher = document.getElementById('btn-rechercher');
  const zoneResultats = document.getElementById('zone-resultats');

  function peuplerGroupes() {
    const n = N_GROUPES[CLASSE_FIXE] || 8;
    selectGroupeEleve.innerHTML = '';
    for (let i = 1; i <= n; i++) {
      const opt = document.createElement('option');
      opt.value = String(i);
      opt.textContent = 'Groupe ' + i;
      selectGroupeEleve.appendChild(opt);
    }
  }
  peuplerGroupes();

  async function rechercher() {
    const groupe = parseInt(selectGroupeEleve.value, 10);
    afficherChargement(zoneResultats);
    try {
      const rows = await chargerOnglet(ONGLETS[CLASSE_FIXE]);
      const items = extraireCreneaux(rows, CLASSE_FIXE, { colonneIndex: 4 + groupe - 1 });
      afficherResultats(zoneResultats, items, CLASSE_FIXE + ' — Groupe ' + groupe,
        { afficherClasseGroupe: false, afficherNomProf: true });
      afficherDebugSiActive(rows, 4 + groupe - 1);
    } catch (e) {
      afficherErreur(zoneResultats, 'Impossible de charger le planning pour le moment. Vérifiez votre connexion, ou réessayez plus tard.');
      console.error(e);
    }
  }

  // Mode debug : ajouter ?debug=1 à la fin de l'URL de la page pour afficher,
  // sous les résultats, les données brutes reçues de Google Sheets (sans console).
  function afficherDebugSiActive(rows, colonneIndex) {
    if (new URLSearchParams(window.location.search).get('debug') !== '1') return;
    let html = '<div style="margin-top:2rem;padding:1rem;background:#fff;border:2px dashed #C99A3D;border-radius:8px;font-family:monospace;font-size:0.75rem;white-space:pre-wrap;word-break:break-word;">';
    html += '<strong>MODE DEBUG — lignes brutes reçues (colonne demandée : index ' + colonneIndex + ')</strong>\n\n';
    rows.forEach((row, i) => {
      if (!row || row.length < 5) return;
      const cellule = row[colonneIndex];
      html += 'Ligne ' + i + ' | A=' + JSON.stringify(row[0]) + ' B=' + JSON.stringify(row[1]) +
        ' | colonne demandée=' + JSON.stringify(cellule) + '\n';
    });
    html += '</div>';
    zoneResultats.innerHTML += html;
  }

  btnRechercher.addEventListener('click', rechercher);

  if (SHEET_ID.startsWith('REMPLACER')) {
    afficherErreur(zoneResultats, 'Configuration manquante : l\'identifiant du Google Sheet n\'a pas encore été renseigné dans le code (variable SHEET_ID en haut du fichier).');
  }
})();
</script>

</body>
</html>
